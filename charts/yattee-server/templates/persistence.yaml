---
{{ if .Values.persistence.downloads.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: "{{ include "yattee-server.fullname" . }}-downloads"
    labels:
        {{- include "yattee-server.labels" . | nindent 6 }}
spec:
    accessModes:
    {{- range .Values.persistence.downloads.accessModes }}
    - {{ . | quote }}
    {{- end }}
    resources:
        requests:
            storage: {{ .Values.persistence.downloads.size }}
    {{ if .Values.persistence.downloads.storageClassName }}
    storageClassName: {{ .Values.persistence.downloads.storageClassName | quote }}
    {{- end }}
{{ end }}
---
{{ if .Values.persistence.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: "{{ include "yattee-server.fullname" . }}-data"
    labels:
        {{- include "yattee-server.labels" . | nindent 6 }}
spec:
    accessModes:
    {{- range .Values.persistence.data.accessModes }}
    - {{ . | quote }}
    {{- end }}
    resources:
        requests:
            storage: {{ .Values.persistence.data.size }}
    {{ if .Values.persistence.data.storageClassName }}
    storageClassName: {{ .Values.persistence.data.storageClassName | quote }}
    {{- end }}
{{ end }}
