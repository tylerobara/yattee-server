name: Release and Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/yattee-server/**"
      - ".github/workflows/helm-publish.yml"
    tags: ["chart-v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release and push to GHCR (otherwise lint/package only)"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/yattee-server
  CHART_NAME: yattee-server

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Template chart (sanity render)
        run: helm template test ${{ env.CHART_PATH }} > /dev/null

  publish:
    needs: lint-and-test
    # Only publish on chart-v* tags or manual dispatch with release=true
    if: startsWith(github.ref, 'refs/tags/chart-v') || (github.event_name == 'workflow_dispatch' && inputs.release)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub releases
      packages: write   # needed to push OCI chart to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Read chart version
        id: chart
        run: |
          CHART_VERSION=$(awk '/^version:/ {print $2}' ${{ env.CHART_PATH }}/Chart.yaml)
          APP_VERSION=$(awk '/^appVersion:/ {gsub(/"/, "", $2); print $2}' ${{ env.CHART_PATH }}/Chart.yaml)
          echo "version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "appVersion=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}"
          echo "App version:   ${APP_VERSION}"

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package ${{ env.CHART_PATH }} --destination .cr-release-packages

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push \
            .cr-release-packages/${{ env.CHART_NAME }}-${{ steps.chart.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${OWNER_LC}/charts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Helm chart ${{ env.CHART_NAME }} v${{ steps.chart.outputs.version }}"
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('chart-v{0}', steps.chart.outputs.version) }}
          body: |
            Helm chart `${{ env.CHART_NAME }}` version `${{ steps.chart.outputs.version }}` (appVersion `${{ steps.chart.outputs.appVersion }}`).

            Install from GHCR:

            ```sh
            helm install my-release oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }} --version ${{ steps.chart.outputs.version }}
            ```
          files: .cr-release-packages/*.tgz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
